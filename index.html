<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHB AI • Your Intelligent Companion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        
        body { font-family: 'Inter', system_ui, sans-serif; }
        .title-font { font-family: 'Space Grotesk', sans-serif; }

        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(148, 163, 184, 0.2);
        }
        .neon-text {
            text-shadow: 0 0 20px rgb(0 240 255), 0 0 40px rgb(192 38 211);
        }
        .chat-bubble-user {
            background: linear-gradient(135deg, #3b82f6, #1e40af);
        }
        .chat-bubble-ai {
            background: rgba(30, 41, 59, 0.95);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }
    </style>
</head>
<body class="bg-zinc-950 text-slate-200">

    <!-- Navbar -->
    <nav class="fixed top-0 left-0 right-0 z-50 glass border-b border-slate-700">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex justify-between items-center">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center text-white font-bold text-2xl">P</div>
                <span class="title-font text-3xl font-semibold tracking-tighter neon-text">PHB AI</span>
            </div>
            <button onclick="connectAPI()" 
                    class="px-6 py-3 rounded-3xl border border-cyan-400 hover:bg-cyan-400 hover:text-black transition-all flex items-center gap-2">
                <i class="fa-solid fa-key"></i> Connect OpenAI
            </button>
        </div>
    </nav>

    <!-- Demo Chat Section -->
    <section id="demo" class="min-h-screen pt-32 pb-20 flex items-center">
        <div class="max-w-2xl mx-auto w-full px-6">
            <div class="text-center mb-10">
                <h1 class="title-font text-6xl font-bold neon-text">PHB AI</h1>
                <p class="text-xl text-slate-400 mt-3">Real AI • Powered by OpenAI</p>
            </div>

            <div class="glass rounded-3xl h-[620px] flex flex-col overflow-hidden shadow-2xl">
                <!-- Chat Header -->
                <div class="px-6 py-5 border-b border-slate-700 bg-zinc-900 flex items-center justify-between">
                    <div class="flex items-center gap-x-3">
                        <div class="w-9 h-9 rounded-2xl bg-gradient-to-br from-cyan-400 to-purple-600 flex items-center justify-center text-2xl font-bold text-white">P</div>
                        <div>
                            <div class="font-semibold">PHB AI</div>
                            <div id="model-name" class="text-xs text-emerald-400">Not Connected</div>
                        </div>
                    </div>
                </div>

                <!-- Messages -->
                <div id="chat-messages" class="flex-1 p-6 overflow-y-auto space-y-6 bg-zinc-950"></div>

                <!-- Input -->
                <div class="p-6 border-t border-slate-700 bg-zinc-900">
                    <form id="chat-form" class="flex gap-3">
                        <input id="chat-input" 
                               type="text" 
                               placeholder="Ask me anything..." 
                               class="flex-1 bg-slate-800 border border-slate-600 focus:border-cyan-400 rounded-3xl px-6 py-5 outline-none text-base">
                        <button type="submit" 
                                class="w-14 h-14 bg-gradient-to-br from-cyan-400 to-purple-500 rounded-3xl flex items-center justify-center text-xl hover:brightness-110 transition">
                            <i class="fa-solid fa-paper-plane"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- API Key Modal -->
    <div id="api-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-xl z-50 flex items-center justify-center">
        <div class="glass rounded-3xl p-8 max-w-md w-full mx-4">
            <h3 class="text-2xl font-semibold mb-6">Connect OpenAI</h3>
            
            <div class="mb-4">
                <label class="block text-sm text-slate-400 mb-2">OpenAI API Key</label>
                <input id="api-key-input" type="password" 
                       class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4 outline-none focus:border-cyan-400"
                       placeholder="sk-...">
            </div>

            <div class="mb-6">
                <label class="block text-sm text-slate-400 mb-2">Model</label>
                <select id="model-select" class="w-full bg-slate-900 border border-slate-600 rounded-2xl px-5 py-4">
                    <option value="gpt-4o-mini">gpt-4o-mini (Fast & Recommended)</option>
                    <option value="gpt-4o">gpt-4o (Most Powerful)</option>
                </select>
            </div>

            <button onclick="saveAPIKey()" 
                    class="w-full py-4 bg-gradient-to-r from-cyan-400 to-purple-600 text-black font-semibold rounded-3xl mb-3">
                Save & Connect
            </button>
            <button onclick="closeModal()" 
                    class="w-full py-4 border border-slate-600 rounded-3xl">
                Cancel
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
              </html>
